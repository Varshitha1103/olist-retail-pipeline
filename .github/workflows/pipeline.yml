name: Olist Retail Pipeline CI/CD

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  test-pipeline:
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v3
    
    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.10'
    
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install pandas numpy matplotlib plotly sqlalchemy pytest
    
    - name: Validate Pipeline Files
      run: |
        echo "✅ Checking pipeline files..."
        python -c "import pandas; print('Pandas OK')"
        python -c "import sqlite3; print('SQLite OK')"
        python -c "import plotly; print('Plotly OK')"
        echo "✅ All dependencies validated!"
    
    - name: Pipeline Success
      run: |
        echo "🚀 Pipeline ready for deployment!"