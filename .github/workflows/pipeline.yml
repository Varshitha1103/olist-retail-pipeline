name: Olist Retail Pipeline CI/CD

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  schedule:
    - cron: '0 0 * * *'

jobs:
  test-pipeline:
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v3
    
    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.10'
    
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install pandas numpy matplotlib plotly sqlalchemy pytest
    
    - name: Run Unit Tests
      run: |
        cd tests
        python test_etl.py
    
    - name: Pipeline Success
      run: |
        echo "🚀 All tests passed! Pipeline ready!"